<!DOCTYPE html>

<head>

    <title>Prelanzamiento - ¿Por qué los planes te salen mal?</title>
    <style>
        body {
            font-family: Arial, sans-serif;

            color: #333;
        }
        .container {
            max-width: 800px;

            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background-color 0.3s;

        }
        .register-button:hover {
            background-color: #219150;
        }
        .small-text {
            display: block;
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;

        footer {
